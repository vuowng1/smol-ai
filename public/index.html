<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMOL ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: #c3ccdb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chat-container { height: calc(100vh - 180px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        .typing-dot { animation: typingAnimation 1.4s infinite both; }
        .typing-dot:nth-child(2) { animation-delay: .2s; }
        .typing-dot:nth-child(3) { animation-delay: .4s; }
        @keyframes typingAnimation { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div class="w-64 bg-[#0f1422] border-r border-[#1e2640] flex flex-col justify-between p-4 hidden md:flex">
        <div>
            <div class="flex items-center gap-3 px-2 py-3 border-b border-[#1e2640] mb-4">
                <i class="fa-solid fa-terminal text-blue-500 text-xl"></i>
                <span class="font-bold tracking-wider text-white text-lg">ERROR ENGINE</span>
            </div>
            <button class="w-full bg-[#1e2538] text-white rounded-lg px-4 py-2.5 flex items-center gap-3 hover:bg-[#28314a] transition text-sm font-medium">
                <i class="fa-regular fa-comment-dots"></i> Khung Trò Chuyện
            </button>
            <button class="w-full text-gray-400 rounded-lg px-4 py-2.5 flex items-center gap-3 hover:bg-[#151b2e] hover:text-white transition text-sm font-medium mt-1">
                <i class="fa-solid fa-gear"></i> Cấu Hình Cài Đặt
            </button>
        </div>
        <button onclick="clearChat()" class="w-full text-red-400 border border-red-900/30 bg-red-950/10 rounded-lg px-4 py-2.5 flex items-center gap-3 hover:bg-red-950/30 transition text-sm font-medium">
            <i class="fa-regular fa-trash-can"></i> Xóa Toàn Bộ Nhớ
        </button>
    </div>

    <div class="flex-1 flex flex-col justify-between bg-[#0b0f19] relative">
        <div class="h-16 border-b border-[#1e2640] flex items-center justify-between px-6 bg-[#0f1422]/50 backdrop-blur-sm">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-xs font-semibold uppercase tracking-widest text-gray-400">Core Engine Activated</span>
            </div>
        </div>

        <div id="chatBox" class="chat-container overflow-y-auto p-6 space-y-6">
            <div class="flex items-start gap-4">
                <div class="w-8 h-8 rounded-lg bg-blue-600/20 border border-blue-500/30 flex items-center justify-center text-blue-400 flex-shrink-0 text-xs font-bold">AI</div>
                <div class="bg-[#0f1422] border border-[#1e2640] rounded-2xl rounded-tl-none px-4 py-3 max-w-[80%] shadow-sm text-sm text-[#cbd5e1] leading-relaxed">
                    Đệ smol đã sẵn sàng hầu chuyện cậu rồi đây! Cậu cần đệ giúp gì cứ ra lệnh nha.
                </div>
            </div>
        </div>

        <div class="p-6 bg-gradient-to-t from-[#0b0f19] via-[#0b0f19] to-transparent">
            <div class="max-w-4xl mx-auto relative flex items-center bg-[#0f1422] border border-[#1e2640] rounded-xl focus-within:border-blue-500 transition-all p-2 px-4 shadow-lg shadow-black/20">
                <input type="text" id="userInput" onkeydown="if(event.key === 'Enter') sendMessage()" placeholder="Nhập câu hỏi hoặc yêu cầu việc code..." class="w-full bg-transparent text-white outline-none py-2.5 text-sm pr-12 placeholder-gray-500">
                <button onclick="sendMessage()" class="absolute right-3 bg-blue-600 text-white w-9 h-9 rounded-lg flex items-center justify-center hover:bg-blue-500 transition active:scale-95 shadow-md shadow-blue-900/20">
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        function appendMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? "flex items-start gap-4 justify-end" : "flex items-start gap-4";

            const avatar = isUser 
                ? `<div class="w-8 h-8 rounded-lg bg-emerald-600/20 border border-emerald-500/30 flex items-center justify-center text-emerald-400 flex-shrink-0 text-xs font-bold">ME</div>`
                : `<div class="w-8 h-8 rounded-lg bg-blue-600/20 border border-blue-500/30 flex items-center justify-center text-blue-400 flex-shrink-0 text-xs font-bold">AI</div>`;

            const msgBg = isUser 
                ? `bg-blue-600 text-white rounded-tr-none border border-blue-500` 
                : `bg-[#0f1422] border border-[#1e2640] text-[#cbd5e1] rounded-tl-none`;

            const content = `
                ${isUser ? '' : avatar}
                <div class="${msgBg} rounded-2xl px-4 py-3 max-w-[80%] text-sm shadow-sm leading-relaxed whitespace-pre-wrap">${text}</div>
                ${isUser ? avatar : ''}
            `;
            
            wrapper.innerHTML = content;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typingIndicator';
            wrapper.className = "flex items-start gap-4";
            wrapper.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-blue-600/20 border border-blue-500/30 flex items-center justify-center text-blue-400 flex-shrink-0 text-xs font-bold">AI</div>
                <div class="bg-[#0f1422] border border-[#1e2640] rounded-2xl rounded-tl-none px-5 py-3 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></span>
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></span>
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></span>
                </div>
            `;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            const indicator = document.getElementById('typingIndicator');
            if(indicator) indicator.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';
            showTyping();

            try {
                // Gọi API tới endpoint tương đối trên Vercel
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }) // Gửi đi đúng từ khóa cấu trúc JSON {"message": text}
                });

                const data = await res.json();
                removeTyping();

                if (res.ok) {
                    // Ưu tiên lấy biến response, nếu không có lấy biến reply
                    const aiReply = data.response || data.reply || JSON.stringify(data);
                    appendMessage(aiReply, false);
                } else {
                    appendMessage(`Feedback error: ${data.detail || 'Unknown server error'}`, false);
                }
            } catch (err) {
                removeTyping();
                appendMessage(`Connection error: Không thể kết nối tới server.`, false);
            }
        }

        function clearChat() {
            chatBox.innerHTML = '';
            appendMessage("Đã dọn dẹp bộ nhớ! Đệ sẵn sàng nhận lệnh mới từ cậu.", false);
        }
    </script>
</body>
</html>
